<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Lookup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }
    .wrap {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }
    .card {
      background: #1f2937;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    h1 { margin-top: 0; }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    input {
      flex: 1;
      min-width: 220px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #0f172a;
      color: white;
      outline: none;
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    pre {
      background: #0f172a;
      color: #d1fae5;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      margin-top: 20px;
      border: 1px solid #374151;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error {
      color: #fca5a5;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Roblox Player Lookup</h1>
      <div class="row">
        <input id="username" placeholder="Username" />
        <input id="compare" placeholder="Optional compare username" />
        <button id="lookupBtn">Lookup</button>
      </div>

      <div id="error" class="error"></div>
      <pre id="output">JSON will show here.</pre>
    </div>
  </div>

  <script>
    const API_BASE = "https://YOUR-VERCEL-PROJECT.vercel.app";

    const usernameInput = document.getElementById("username");
    const compareInput = document.getElementById("compare");
    const lookupBtn = document.getElementById("lookupBtn");
    const output = document.getElementById("output");
    const errorBox = document.getElementById("error");

    async function lookup() {
      const username = usernameInput.value.trim();
      const compare = compareInput.value.trim();

      errorBox.textContent = "";
      output.textContent = "Loading...";

      if (!username) {
        output.textContent = "JSON will show here.";
        errorBox.textContent = "Please enter a username.";
        return;
      }

      const params = new URLSearchParams({ username });
      if (compare) params.set("compare", compare);

      try {
        const res = await fetch(`${API_BASE}/api/lookup?${params.toString()}`);
        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || "Lookup failed.");
        }

        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = "JSON will show here.";
        errorBox.textContent = err.message;
      }
    }

    lookupBtn.addEventListener("click", lookup);
    usernameInput.addEventListener("keydown", e => { if (e.key === "Enter") lookup(); });
    compareInput.addEventListener("keydown", e => { if (e.key === "Enter") lookup(); });
  </script>
</body>
</html>
